function log(cls, text) {
  const el = document.createElement('div');
  el.className = cls;
  el.textContent = text;
  document.getElementById('log').appendChild(el);
}

function seed() {
  const now = Date.now();
  const day = 86400000;

  // Timestamps distincts dans les 30 derniers jours, du plus récent au plus ancien
  const slots = SEEDS.map(() => now - Math.random() * 30 * day)
    .sort((a, b) => b - a);

  // ── Conversations ────────────────────────────────────────────────────────
  let convs = [];
  try { convs = JSON.parse(localStorage.getItem(CONV_KEY) || '[]'); } catch {}
  const existingIds = new Set(convs.map(c => c.id));

  let addedConvs = 0;
  for (let i = 0; i < SEEDS.length; i++) {
    const s = SEEDS[i];
    if (existingIds.has(s.id)) { log('ski', '⊘ ' + s.id + ' — déjà présent, ignoré'); continue; }
    const ts = slots[i];

    // Timestamps de messages : 30 s par message non-ack (tool-ack n'a pas de ts).
    // lastMsgTs = ts du dernier message user/assistant, utilisé comme updatedAt.
    let tsCounter = 0;
    let lastMsgTs = ts;
    const messages = s.messages.map(m => {
      if (m.role === 'tool-ack' || m.role === 'memory-ack') return { ...m };
      lastMsgTs = ts + tsCounter * 30000;
      tsCounter++;
      return m.role === 'assistant'
        ? { ...m, model: MODEL, ts: lastMsgTs }
        : { ...m, ts: lastMsgTs };
    });

    convs.push({ id: s.id, title: s.title, timestamp: ts, updatedAt: lastMsgTs, messages });
    addedConvs++;
  }
  // Tri desc par timestamp (attendu par listAllConversations)
  convs.sort((a, b) => b.timestamp - a.timestamp);
  localStorage.setItem(CONV_KEY, JSON.stringify(convs));

  // ── Résumés ──────────────────────────────────────────────────────────────
  let summs = {};
  try { summs = JSON.parse(localStorage.getItem(SUMM_KEY) || '{}'); } catch {}

  let addedSumms = 0;
  for (let i = 0; i < SEEDS.length; i++) {
    const s = SEEDS[i];
    if (summs[s.id] && !summs[s.id].suppressed) { continue; }
    const ts = slots[i];
    // messageCount = messages user/assistant uniquement (pas les tool-acks)
    const msgCount = s.messages.filter(m => m.role === 'user' || m.role === 'assistant').length;
    summs[s.id] = {
      id: s.id,
      title: s.title,
      timestamp: ts,
      summary: s.summary,
      keywords: s.keywords,
      messageCount: msgCount,
    };
    addedSumms++;
  }
  localStorage.setItem(SUMM_KEY, JSON.stringify(summs));

  if (addedConvs) log('ok', '✓ ' + addedConvs + ' conversation(s) ajoutée(s)');
  if (addedSumms) log('ok', '✓ ' + addedSumms + ' résumé(s) ajouté(s)');
  if (!addedConvs && !addedSumms) log('ski', '⊘ Tout était déjà présent, rien à faire.');
  log('', '');
  log('', 'Recharge MIAOU pour voir les conversations dans la sidebar.');
}
